name: rs-guard PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: rs-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download and verify rs-guard
        run: |
          set -euo pipefail
          VERSION="v1.6.0"
          BINARY="rs-guard-x86_64-unknown-linux-gnu"
          BASE_URL="https://github.com/nebulaideas/rs-guard/releases/download/${VERSION}"
          curl --fail --silent --show-error --location --retry 3 --retry-delay 2 \
            -o "${BINARY}" "${BASE_URL}/${BINARY}"
          curl --fail --silent --show-error --location --retry 3 --retry-delay 2 \
            -o "${BINARY}.sha256" "${BASE_URL}/${BINARY}.sha256"
          sha256sum -c "${BINARY}.sha256"
          chmod +x "${BINARY}"
          mv "${BINARY}" rs-guard

      - name: Run rs-guard review
        run: ./rs-guard --prompt-file .github/review-prompt.md --provider openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL_NAME: ${{ github.repository }}
