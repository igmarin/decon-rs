# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# Run locally:  cargo deny check
# CI job:       .github/workflows/ci.yml (deny job)

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
# serde_yml/libyml (RUSTSEC-2025-0067/0068) were removed in #75; no
# advisories are currently ignored.
ignore = []

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
exceptions = []

[licenses.private]
ignore = true
registries = []

[bans]
multiple-versions = "warn"
# Workspace path dependencies (e.g. `decon-core = { path = "../decon-core" }`)
# have no version requirement and are flagged as wildcards. Allow them so the
# check passes for this workspace layout.
wildcards = "allow"
deny = []
skip = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
